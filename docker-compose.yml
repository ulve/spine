services:
  app:
    build: .
    container_name: ebook-server
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/app.db
      - PORT=3000
    volumes:
      - ./data:/app/data
      - ./books:/app/books
    restart: always

volumes:
  data:
  books:
